# cyncia configuration. See .cyncia/README.md for details.
#
# This file is read by the sync scripts at run time. The installer
# leaves an existing file alone, prompts before adding new properties
# introduced by future versions, and prompts before removing
# properties that are no longer supported.

# How rules/<name>.md is emitted for Claude Code: 'claude-md' merges rule
# bodies into CLAUDE.md (default); 'rule-files' writes one file per rule to
# .claude/rules/<name>.md and imports them from CLAUDE.md via @-imports so
# Claude loads them with the same priority as CLAUDE.md.
claude-rules-mode: claude-md

# How Codex Markdown rule guidance is handled: 'agents-override' merges
# AGENTS.md plus rules/*.md into AGENTS.override.md at the output root;
# 'ignore' does not emit Markdown rules for Codex.
codex-rules-mode: agents-override

# Whether Codex MCP servers are synced into .codex/config.toml. When enabled,
# cyncia updates only the mcp_servers tables and preserves unrelated Codex
# config.
codex-sync-mcp: true

# Comma-separated tool list used by sync-all when --tools / -Tools is omitted.
default-tools: cursor,claude,copilot,vscode,junie,codex
