<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 220" width="1000" role="img" aria-label="MARSHAL SDLC overview">
  <defs>
    <marker id="sd-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155"/>
    </marker>
    <marker id="sd-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="500" y="18" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f172a">MARSHAL lifecycle</text>
  <rect x="20" y="100" width="90" height="40" rx="20" fill="#f1f5f9" stroke="#334155" stroke-width="1.3"/>
  <text x="65" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0f172a">0. Intake</text>
  <rect x="125" y="100" width="90" height="40" rx="20" fill="#f1f5f9" stroke="#334155" stroke-width="1.3"/>
  <text x="170" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0f172a">1. Analysis</text>
  <rect x="230" y="100" width="110" height="40" rx="20" fill="#f1f5f9" stroke="#334155" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="285" y="119" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">1.5. Arch.</text>
  <text x="285" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569" font-style="italic">(optional)</text>
  <rect x="355" y="100" width="80" height="40" rx="20" fill="#f1f5f9" stroke="#334155" stroke-width="1.3"/>
  <text x="395" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0f172a">2. Plan</text>
  <rect x="450" y="50" width="320" height="140" rx="10" fill="#fefce8" stroke="#713f12" stroke-width="1.5"/>
  <text x="610" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0f172a">3. Implementation round</text>
  <text x="610" y="84" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" font-style="italic">once, or per phase / slice</text>
  <rect x="465" y="100" width="85" height="40" rx="20" fill="#dbeafe" stroke="#1e40af" stroke-width="1.2"/>
  <text x="507" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">Implement</text>
  <rect x="565" y="100" width="70" height="40" rx="20" fill="#fce7f3" stroke="#9d174d" stroke-width="1.2"/>
  <text x="600" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">Verify</text>
  <rect x="650" y="100" width="105" height="40" rx="20" fill="#dcfce7" stroke="#166534" stroke-width="1.2"/>
  <text x="703" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">PR / merge</text>
  <path d="M 550 120 L 563 120" stroke="#475569" stroke-width="1.4" marker-end="url(#sd-b)"/>
  <path d="M 635 120 L 648 120" stroke="#475569" stroke-width="1.4" marker-end="url(#sd-b)"/>
  <path d="M 700 140 Q 700 172 500 168 Q 468 166 468 142" fill="none" stroke="#475569" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#sd-b)"/>
  <text x="600" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" font-style="italic">next round</text>
  <rect x="785" y="100" width="90" height="40" rx="20" fill="#f1f5f9" stroke="#334155" stroke-width="1.3"/>
  <text x="830" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0f172a">4. Rollout</text>
  <rect x="890" y="100" width="90" height="40" rx="20" fill="#f1f5f9" stroke="#334155" stroke-width="1.3"/>
  <text x="935" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0f172a">5. Learn</text>
  <path d="M 110 120 L 123 120" stroke="#334155" stroke-width="1.5" marker-end="url(#sd-a)"/>
  <path d="M 215 120 L 228 120" stroke="#334155" stroke-width="1.5" marker-end="url(#sd-a)"/>
  <path d="M 340 120 L 353 120" stroke="#334155" stroke-width="1.5" marker-end="url(#sd-a)"/>
  <path d="M 435 120 L 448 120" stroke="#334155" stroke-width="1.5" marker-end="url(#sd-a)"/>
  <path d="M 770 120 L 783 120" stroke="#334155" stroke-width="1.5" marker-end="url(#sd-a)"/>
  <path d="M 875 120 L 888 120" stroke="#334155" stroke-width="1.5" marker-end="url(#sd-a)"/>
</svg>
