# MARSHAL configuration. See .marshal/ENTRYPOINT.md.

knowledge:
  # General contract every knowledge implementation must satisfy.
  contract_ref: references/knowledge-contract.md

  # Active knowledge implementation. Swap the representation by pointing this
  # at another implementation reference that satisfies contract_ref.
  representation_ref: references/knowledge-markdown-spine.md

  # review = every write produces a diff for human approval (default).
  # auto   = agents may write knowledge files without per-change approval.
  autonomy: review

  # Advisory only. The rescan must still be triggered explicitly via
  # marshal-knowledge-maintain (mode: rescan). No hooks, no daemons.
  rescan_period_days: 7

  # Cap for the always-loaded root INDEX.md.
  root_index_max_lines: 150

  # Cap for any sub-index file (folder index, topic sub-index, etc.).
  subindex_max_lines: 150

  # Soft cap for an individual topic file. When exceeded,
  # marshal-knowledge-maintain proposes splitting the topic into a folder
  # with a sub-index plus subtopic files. The split dimension (by
  # component, by concern, by feature, by time, etc.) is chosen per topic
  # and may be revised during a knowledge review.
  topic_max_lines: 400

# Config-sync (cyncia) integration. Used by marshal-promote-assets.
sync:
  # Config-sync source tree that cyncia consumes. Built-in and extension
  # assets are promoted here, then fanned out to tool layouts by the
  # agent-conf-sync (cyncia) skill.
  agent_config_dir: .agent-config

  # Which built-in skill flavor to promote:
  #   delegate = thin marshal-delegate-to-* wrappers that spawn subagents
  #              in fresh context (default; needs subagent support).
  #   fallback = full inline marshal-* skills for tools without subagents.
  skill_flavor: delegate
